<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Alt Trader – Free Channel</title>

  <!-- TikTok Pixel Base Code — Paste your full TikTok pixel code here and replace this comment -->
  <!-- End TikTok Pixel Base Code -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background-color: #0d0d0d;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background-color: #1a1a1a;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .banner {
      width: 100%;
      display: block;
      max-height: 200px;
      object-fit: cover;
    }

    .body {
      padding: 28px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: #2a2a2a;
      border: 3px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: #ffffff;
      margin-top: -52px;
      margin-bottom: 14px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .channel-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .members {
      font-size: 0.88rem;
      color: #888888;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .tag {
      background-color: #2a2a2a;
      color: #cccccc;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #333;
    }

    .description {
      font-size: 0.88rem;
      color: #aaaaaa;
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 320px;
    }

    .description strong {
      color: #ffffff;
      font-weight: 600;
    }

    .join-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #2AABEE, #1e96d4);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 12px;
      text-decoration: none;
      text-align: center;
      margin-bottom: 16px;
      transition: opacity 0.2s ease, transform 0.1s ease;
      letter-spacing: 0.3px;
    }

    .join-btn:hover {
      opacity: 0.9;
      transform: scale(1.01);
    }

    .disclaimer {
      font-size: 0.72rem;
      color: #555555;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">

    <img
      src="https://i.ibb.co/zh0GKzWg/VR8lrp-Sbi-Rtj-Pl36u-B34-Mfr-QA6-AZGg-Owe-n-F1-SPAq-Qe7u0-Btg-H1-Qxx-YJNa-CNkp-Qvuj-Ov-A5t-HNn3n-Nv-JK50p.jpg"
      alt="Alt Trader"
      class="banner"
    />

    <div class="body">

      <div class="avatar">
        <img
          src="https://i.ibb.co/zh0GKzWg/VR8lrp-Sbi-Rtj-Pl36u-B34-Mfr-QA6-AZGg-Owe-n-F1-SPAq-Qe7u0-Btg-H1-Qxx-YJNa-CNkp-Qvuj-Ov-A5t-HNn3n-Nv-JK50p.jpg"
          alt="AT"
        />
      </div>

      <h1 class="channel-name">Alt Trader</h1>
      <p class="members">8,527 members</p>

      <div class="tags">
        <span class="tag">Chart Analysis</span>
        <span class="tag">Market Psychology</span>
        <span class="tag">Free Education</span>
      </div>

      <p class="description">
        Educational charts, analysis &amp; market psychology lessons.
        <strong>Not a signals channel.</strong> All content is for learning
        purposes only — not financial advice.
      </p>

      <a href="https://ads.financoach.com" class="join-btn">
        JOIN FREE CHANNEL
      </a>

      <p class="disclaimer">Not financial advice · Educational content only</p>

    </div>
  </div>

</body>
</html>
